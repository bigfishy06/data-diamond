<html lang="en">
<head>

  <link rel="stylesheet" href="css/style.css" />
<script>
  const HASH = '2700114b0b68384c38a1018ac02dd3825205f695857ec23f9d1493280452b3a2';
  const key  = 'dd_auth';
  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }
  async function checkAuth() {
    if (sessionStorage.getItem(key) === 'ok' || localStorage.getItem(key) === 'ok') return;
    const overlay = document.createElement('div');
    overlay.id = 'auth-overlay';
    overlay.innerHTML = `
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap');
        #auth-overlay{position:fixed;inset:0;z-index:99999;background:#080c12;display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;}
        #auth-overlay .auth-bg{position:absolute;inset:0;background:radial-gradient(ellipse 60% 60% at 50% 40%,rgba(255,184,28,0.06) 0%,transparent 70%),radial-gradient(ellipse 40% 40% at 80% 80%,rgba(0,61,165,0.08) 0%,transparent 60%);}
        #auth-overlay .auth-box{position:relative;z-index:1;width:100%;max-width:420px;padding:48px 40px;background:rgba(13,20,32,0.95);border:1px solid rgba(255,184,28,0.15);border-radius:4px;box-shadow:0 0 80px rgba(0,0,0,0.6);text-align:center;}
        #auth-overlay .auth-logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:32px;}
        #auth-overlay .auth-logo svg{width:36px;height:36px;}
        #auth-overlay .auth-logo-text{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:0.05em;color:#fff;}
        #auth-overlay .auth-logo-text em{color:#FFB81C;font-style:normal;}
        #auth-overlay h2{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:0.15em;color:rgba(255,255,255,0.35);margin:0 0 32px;text-transform:uppercase;}
        #auth-overlay input[type="password"]{width:100%;box-sizing:border-box;padding:14px 16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:3px;color:#fff;font-family:'DM Mono',monospace;font-size:14px;outline:none;transition:border-color 0.2s;margin-bottom:16px;}
        #auth-overlay input[type="password"]:focus{border-color:rgba(255,184,28,0.5);}
        #auth-overlay button{width:100%;padding:14px;background:#FFB81C;border:none;border-radius:3px;color:#080c12;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:0.1em;cursor:pointer;}
        #auth-overlay .auth-error{margin-top:12px;height:16px;font-size:12px;color:#ff4444;font-family:'DM Mono',monospace;}
      </style>
      <div class="auth-bg"></div>
      <div class="auth-box">
        <div class="auth-logo">
          <svg viewBox="0 0 40 40" fill="none"><polygon points="20,2 38,20 20,38 2,20" stroke="#FFB81C" stroke-width="2.5" fill="none"/><polygon points="20,9 31,20 20,31 9,20" stroke="#FFB81C" stroke-width="1.5" fill="rgba(255,184,28,0.12)"/><circle cx="20" cy="20" r="3" fill="#FFB81C"/></svg>
          <span class="auth-logo-text">Data<em>Diamond</em></span>
        </div>
        <h2>Canadian Baseball League · Restricted Access</h2>
        <input type="password" id="auth-input" placeholder="Enter password" autocomplete="off" />
        <button id="auth-btn">Enter</button>
        <div class="auth-error" id="auth-error"></div>
      </div>`;
    document.body.appendChild(overlay);
    document.getElementById('auth-input').focus();
    return new Promise(resolve => {
      async function attempt() {
        const pwd = document.getElementById('auth-input').value;
        const hash = await sha256(pwd);
        if (hash === HASH) {
          sessionStorage.setItem(key, 'ok');
          overlay.style.opacity = '0'; overlay.style.transition = 'opacity 0.4s';
          setTimeout(() => overlay.remove(), 400); resolve();
        } else {
          document.getElementById('auth-error').textContent = 'Incorrect password — try again.';
          document.getElementById('auth-input').value = '';
          document.getElementById('auth-input').focus();
        }
      }
      document.getElementById('auth-btn').addEventListener('click', attempt);
      document.getElementById('auth-input').addEventListener('keydown', e => { if (e.key === 'Enter') attempt(); });
    });
  }
  document.addEventListener('DOMContentLoaded', checkAuth);
</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── Schedule grid ── */
    .schedule-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      margin-bottom: 32px;
    }
    .schedule-day-header {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.25);
      text-align: center;
      padding: 8px 0;
      text-transform: uppercase;
    }
    .schedule-cell {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 6px;
      min-height: 90px;
      padding: 8px;
      position: relative;
      transition: background 0.15s;
    }
    .schedule-cell:hover { background: rgba(255,255,255,0.04); }
    .schedule-cell.empty { background: transparent; border-color: transparent; }
    .schedule-cell.today {
      border-color: rgba(255,184,28,0.5);
      background: rgba(255,184,28,0.04);
    }
    .schedule-cell.has-game { cursor: pointer; }
    .schedule-cell.has-game:hover {
      border-color: rgba(255,184,28,0.3);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    .cell-date {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      margin-bottom: 6px;
    }
    .cell-date.today-num {
      color: #FFB81C;
      font-weight: 600;
    }
    .game-chip {
      background: rgba(255,184,28,0.1);
      border: 1px solid rgba(255,184,28,0.25);
      border-radius: 4px;
      padding: 4px 6px;
      margin-bottom: 3px;
    }
    .game-chip.home {
      background: rgba(52,211,153,0.08);
      border-color: rgba(52,211,153,0.2);
    }
    .game-chip.away {
      background: rgba(96,165,250,0.08);
      border-color: rgba(96,165,250,0.2);
    }
    .game-chip-teams {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 11px;
      letter-spacing: 0.05em;
      color: #fff;
      line-height: 1.2;
    }
    .game-chip-time {
      font-family: 'DM Mono', monospace;
      font-size: 8px;
      color: rgba(255,255,255,0.35);
      margin-top: 2px;
    }
    .game-chip-loc {
      font-family: 'DM Mono', monospace;
      font-size: 8px;
      color: rgba(255,184,28,0.6);
    }

    /* ── Week nav ── */
    .week-nav {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }
    .week-nav-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: rgba(255,255,255,0.5);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .week-nav-btn:hover { border-color: #FFB81C; color: #FFB81C; }
    .week-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 0.08em;
      color: #fff;
      flex: 1;
    }
    .today-btn {
      background: rgba(255,184,28,0.1);
      border: 1px solid rgba(255,184,28,0.3);
      border-radius: 6px;
      color: #FFB81C;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .today-btn:hover { background: rgba(255,184,28,0.2); }

    /* ── Team filter ── */
    .team-filter-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .team-filter-btn {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      padding: 5px 12px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.03);
      color: rgba(255,255,255,0.4);
    }
    .team-filter-btn.active {
      border-color: #FFB81C;
      background: rgba(255,184,28,0.1);
      color: #FFB81C;
    }

    /* ── Upcoming list ── */
    .upcoming-list { display: flex; flex-direction: column; gap: 8px; }
    .upcoming-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 16px;
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      transition: all 0.15s;
    }
    .upcoming-item:hover {
      background: rgba(255,255,255,0.04);
      border-color: rgba(255,184,28,0.2);
    }
    .upcoming-date-col {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      width: 80px;
      flex-shrink: 0;
    }
    .upcoming-date-col .day {
      font-size: 13px;
      color: #FFB81C;
      font-weight: 600;
      display: block;
    }
    .upcoming-matchup {
      flex: 1;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      letter-spacing: 0.05em;
      color: #fff;
    }
    .upcoming-meta {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      text-align: right;
    }
    .home-badge {
      font-family: 'DM Mono', monospace;
      font-size: 8px;
      letter-spacing: 0.1em;
      padding: 2px 7px;
      border-radius: 3px;
      text-transform: uppercase;
    }
    .home-badge.home { background: rgba(52,211,153,0.12); color: #34d399; border: 1px solid rgba(52,211,153,0.2); }
    .home-badge.away { background: rgba(96,165,250,0.12); color: #60a5fa; border: 1px solid rgba(96,165,250,0.2); }

    /* ── Section tabs ── */
    .tracking-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 32px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding-bottom: 0;
    }
    .tracking-tab {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 14px;
      letter-spacing: 0.1em;
      padding: 10px 20px;
      cursor: pointer;
      color: rgba(255,255,255,0.35);
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
      margin-bottom: -1px;
    }
    .tracking-tab:hover { color: rgba(255,255,255,0.7); }
    .tracking-tab.active { color: #FFB81C; border-bottom-color: #FFB81C; }
  </style>
</head>

  <script>
  // ── Schedule data — paste your games here ─────────────────────────────────
  // Format: { date: 'YYYY-MM-DD', home: 'Team Name', away: 'Team Name', time: '7:05 PM', location: 'Stadium Name' }
  var SCHEDULE = [
    // Example entries — replace with real schedule
    { date: '2026-05-15', home: 'Toronto Maple Leafs',    away: 'Barrie Baycats',       time: '7:35 PM', location: 'Christie Pits' },
    { date: '2026-05-15', home: 'London Majors',           away: 'Guelph Royals',         time: '7:05 PM', location: 'Labatt Memorial' },
    { date: '2026-05-15', home: 'Hamilton Cardinals',      away: 'Brantford Red Sox',     time: '7:00 PM', location: 'Mohawk Park' },
    { date: '2026-05-16', home: 'Kitchener Panthers',      away: 'Welland Jackfish',      time: '7:05 PM', location: 'Kinsmen Park' },
    { date: '2026-05-16', home: 'Chatham-Kent Barnstormers', away: 'Barrie Baycats',     time: '7:05 PM', location: 'Fergie Jenkins Field' },
    { date: '2026-05-17', home: 'Barrie Baycats',          away: 'Toronto Maple Leafs',   time: '2:05 PM', location: 'Midhurst Valley' },
    { date: '2026-05-17', home: 'Guelph Royals',           away: 'London Majors',         time: '1:05 PM', location: 'Hastings Stadium' },
    { date: '2026-05-22', home: 'Toronto Maple Leafs',     away: 'Hamilton Cardinals',    time: '7:35 PM', location: 'Christie Pits' },
    { date: '2026-05-22', home: 'Welland Jackfish',        away: 'Kitchener Panthers',    time: '7:05 PM', location: 'Welland Stadium' },
  ];

  var MY_TEAM = null; // Set to your team name to highlight home/away, e.g. 'Toronto Maple Leafs'

  // ── Teams ─────────────────────────────────────────────────────────────────
  var ALL_TEAMS = [
    'Barrie Baycats','Brantford Red Sox','Chatham-Kent Barnstormers',
    'Guelph Royals','Hamilton Cardinals','Kitchener Panthers',
    'London Majors','Toronto Maple Leafs','Welland Jackfish'
  ];

  var TEAM_COLORS = {
    'Barrie Baycats': '#C8102E', 'Brantford Red Sox': '#BD3039',
    'Chatham-Kent Barnstormers': '#E87722', 'Guelph Royals': '#003DA5',
    'Hamilton Cardinals': '#C8102E', 'Kitchener Panthers': '#888888',
    'London Majors': '#003DA5', 'Toronto Maple Leafs': '#134A8E',
    'Welland Jackfish': '#00703C'
  };

  // ── State ─────────────────────────────────────────────────────────────────
  var today       = new Date();
  today.setHours(0,0,0,0);
  var weekStart   = new Date(today);
  weekStart.setDate(today.getDate() - today.getDay()); // Sunday
  var activeTeam  = 'all';
  var activeTabId = 'schedule';

  // ── Helpers ───────────────────────────────────────────────────────────────
  function dateStr(d) {
    var y = d.getFullYear();
    var m = String(d.getMonth()+1).padStart(2,'0');
    var dd = String(d.getDate()).padStart(2,'0');
    return y+'-'+m+'-'+dd;
  }
  function parseDate(s) {
    var p = s.split('-');
    return new Date(parseInt(p[0]), parseInt(p[1])-1, parseInt(p[2]));
  }
  function shortTeam(name) {
    var map = {
      'Toronto Maple Leafs':'TOR','Barrie Baycats':'BAR','Brantford Red Sox':'BRA',
      'Chatham-Kent Barnstormers':'CKB','Guelph Royals':'GUE','Hamilton Cardinals':'HAM',
      'Kitchener Panthers':'KIT','London Majors':'LON','Welland Jackfish':'WEL'
    };
    return map[name] || name.slice(0,3).toUpperCase();
  }
  function filteredGames() {
    if (activeTeam === 'all') return SCHEDULE;
    return SCHEDULE.filter(function(g) { return g.home === activeTeam || g.away === activeTeam; });
  }

  // ── Build team filter ─────────────────────────────────────────────────────
  function buildTeamFilter() {
    var row = document.getElementById('team-filter-row');
    ALL_TEAMS.forEach(function(t) {
      var btn = document.createElement('button');
      btn.className = 'team-filter-btn';
      btn.dataset.team = t;
      btn.textContent = shortTeam(t);
      btn.style.borderColor = 'rgba(255,255,255,0.1)';
      btn.addEventListener('click', function() {
        activeTeam = t;
        document.querySelectorAll('.team-filter-btn').forEach(function(b) {
          b.classList.remove('active');
          b.style.borderColor = 'rgba(255,255,255,0.1)';
          b.style.color = '';
        });
        btn.classList.add('active');
        btn.style.borderColor = TEAM_COLORS[t] || '#FFB81C';
        btn.style.color = TEAM_COLORS[t] || '#FFB81C';
        btn.style.background = (TEAM_COLORS[t] || '#FFB81C').replace('#','rgba(') + ',0.1)';
        renderActive();
      });
      row.appendChild(btn);
    });
    // All teams button handler
    row.querySelector('[data-team="all"]').addEventListener('click', function() {
      activeTeam = 'all';
      document.querySelectorAll('.team-filter-btn').forEach(function(b) {
        b.classList.remove('active');
        b.style.borderColor = 'rgba(255,255,255,0.1)';
        b.style.color = '';
        b.style.background = '';
      });
      this.classList.add('active');
      renderActive();
    });
  }

  // ── Render calendar week ───────────────────────────────────────────────────
  function renderSchedule() {
    var grid = document.getElementById('schedule-grid');
    var weekEnd = new Date(weekStart);
    weekEnd.setDate(weekStart.getDate() + 6);

    // Week label
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    document.getElementById('week-label').textContent =
      months[weekStart.getMonth()] + ' ' + weekStart.getDate() + ' – ' +
      months[weekEnd.getMonth()] + ' ' + weekEnd.getDate() + ', ' + weekEnd.getFullYear();

    var games = filteredGames();
    var html = '';
    for (var i = 0; i < 7; i++) {
      var d = new Date(weekStart);
      d.setDate(weekStart.getDate() + i);
      var ds = dateStr(d);
      var isToday = ds === dateStr(today);
      var dayGames = games.filter(function(g) { return g.date === ds; });

      html += '<div class="schedule-cell' +
        (dayGames.length ? ' has-game' : '') +
        (isToday ? ' today' : '') + '">';
      html += '<div class="cell-date' + (isToday ? ' today-num' : '') + '">' + d.getDate() + '</div>';

      dayGames.forEach(function(g) {
        var isHome = MY_TEAM && g.home === MY_TEAM;
        var isAway = MY_TEAM && g.away === MY_TEAM;
        var chipClass = 'game-chip' + (isHome ? ' home' : isAway ? ' away' : '');
        var tc = TEAM_COLORS[g.home] || '#FFB81C';
        html += '<div class="' + chipClass + '" style="border-left:2px solid ' + tc + '">' +
          '<div class="game-chip-teams">' + shortTeam(g.away) + ' @ ' + shortTeam(g.home) + '</div>' +
          '<div class="game-chip-time">' + g.time + '</div>' +
          (g.location ? '<div class="game-chip-loc">' + g.location + '</div>' : '') +
          '</div>';
      });

      html += '</div>';
    }
    grid.innerHTML = html;
  }

  // ── Render upcoming list ──────────────────────────────────────────────────
  function renderUpcoming() {
    var list  = document.getElementById('upcoming-list');
    var now   = dateStr(today);
    var games = filteredGames()
      .filter(function(g) { return g.date >= now; })
      .sort(function(a, b) { return a.date < b.date ? -1 : 1; })
      .slice(0, 20);

    if (!games.length) {
      list.innerHTML = '<div style="text-align:center;padding:48px;font-family:var(--font-mono);font-size:12px;color:rgba(255,255,255,0.25)">No upcoming games found</div>';
      return;
    }

    var days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    list.innerHTML = games.map(function(g) {
      var d   = parseDate(g.date);
      var tc  = TEAM_COLORS[g.home] || '#FFB81C';
      var isHome = MY_TEAM && g.home === MY_TEAM;
      var isAway = MY_TEAM && g.away === MY_TEAM;
      var badge = (isHome || isAway)
        ? '<span class="home-badge ' + (isHome ? 'home' : 'away') + '">' + (isHome ? 'HOME' : 'AWAY') + '</span>'
        : '';
      var trackUrl = 'tracker.html?home=' + encodeURIComponent(g.home) + '&away=' + encodeURIComponent(g.away) + '&date=' + g.date;
      return '<div class="upcoming-item">' +
        '<div style="width:4px;height:40px;border-radius:2px;background:' + tc + ';flex-shrink:0"></div>' +
        '<div class="upcoming-date-col">' +
          '<span class="day">' + days[d.getDay()] + ' ' + d.getDate() + '</span>' +
          months[d.getMonth()] + ' ' + d.getFullYear() +
        '</div>' +
        '<div class="upcoming-matchup">' + g.away + ' @ ' + g.home + '</div>' +
        '<div class="upcoming-meta">' +
          badge +
          '<div style="margin-top:4px">' + g.time + '</div>' +
          (g.location ? '<div>' + g.location + '</div>' : '') +
        '</div>' +
        '<a href="' + trackUrl + '" style="flex-shrink:0;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.1em;padding:6px 14px;border-radius:4px;border:1px solid rgba(255,184,28,0.4);background:rgba(255,184,28,0.08);color:#FFB81C;text-decoration:none;transition:all .15s;white-space:nowrap" onmouseover="this.style.background='rgba(255,184,28,0.18)'" onmouseout="this.style.background='rgba(255,184,28,0.08)'">▶ TRACK</a>' +
      '</div>';
    }).join('');
  }

  // ── Tab switching ─────────────────────────────────────────────────────────
  document.querySelectorAll('.tracking-tab').forEach(function(btn) {
    btn.addEventListener('click', function() {
      activeTabId = btn.dataset.tab;
      document.querySelectorAll('.tracking-tab').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      document.getElementById('tab-schedule').style.display = activeTabId === 'schedule' ? '' : 'none';
      document.getElementById('tab-upcoming').style.display = activeTabId === 'upcoming' ? '' : 'none';
      renderActive();
    });
  });

  function renderActive() {
    if (activeTabId === 'schedule') renderSchedule();
    else renderUpcoming();
  }

  // ── Week navigation ───────────────────────────────────────────────────────
  document.getElementById('prev-week').addEventListener('click', function() {
    weekStart.setDate(weekStart.getDate() - 7); renderSchedule();
  });
  document.getElementById('next-week').addEventListener('click', function() {
    weekStart.setDate(weekStart.getDate() + 7); renderSchedule();
  });
  document.getElementById('go-today').addEventListener('click', function() {
    weekStart = new Date(today);
    weekStart.setDate(today.getDate() - today.getDay());
    renderSchedule();
  });

  // ── Init ──────────────────────────────────────────────────────────────────
  buildTeamFilter();
  renderSchedule();
  </script>
</body>
</html>
