<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Diamond — CBL Stats</title>
  <link rel="stylesheet" href="css/style.css" />
<script>
  const HASH = '2700114b0b68384c38a1018ac02dd3825205f695857ec23f9d1493280452b3a2';
  const key  = 'dd_auth';

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  async function checkAuth() {
    if (sessionStorage.getItem(key) === 'ok' || localStorage.getItem(key) === 'ok') return;

    const overlay = document.createElement('div');
    overlay.id = 'auth-overlay';
    overlay.innerHTML = `
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap');
        #auth-overlay {
          position:fixed;inset:0;z-index:99999;
          background:#080c12;
          display:flex;align-items:center;justify-content:center;
          font-family:'Inter',sans-serif;
        }
        #auth-overlay .auth-bg {
          position:absolute;inset:0;
          background:
            radial-gradient(ellipse 60% 60% at 50% 40%, rgba(255,184,28,0.06) 0%, transparent 70%),
            radial-gradient(ellipse 40% 40% at 80% 80%, rgba(0,61,165,0.08) 0%, transparent 60%);
        }
        #auth-overlay .auth-box {
          position:relative;z-index:1;
          width:100%;max-width:420px;
          padding:48px 40px;
          background:rgba(13,20,32,0.95);
          border:1px solid rgba(255,184,28,0.15);
          border-radius:4px;
          box-shadow:0 0 80px rgba(0,0,0,0.6), 0 0 40px rgba(255,184,28,0.04);
          text-align:center;
        }
        #auth-overlay .auth-logo {
          display:flex;align-items:center;justify-content:center;gap:10px;
          margin-bottom:32px;
        }
        #auth-overlay .auth-logo svg { width:36px;height:36px; }
        #auth-overlay .auth-logo-text {
          font-family:'Bebas Neue',sans-serif;
          font-size:28px;letter-spacing:0.05em;
          color:#fff;
        }
        #auth-overlay .auth-logo-text em { color:#FFB81C;font-style:normal; }
        #auth-overlay h2 {
          font-family:'Bebas Neue',sans-serif;
          font-size:13px;letter-spacing:0.15em;
          color:rgba(255,255,255,0.35);
          margin:0 0 32px;
          text-transform:uppercase;
        }
        #auth-overlay .auth-input-wrap { position:relative;margin-bottom:16px; }
        #auth-overlay input[type="password"] {
          width:100%;box-sizing:border-box;
          padding:14px 16px;
          background:rgba(255,255,255,0.04);
          border:1px solid rgba(255,255,255,0.1);
          border-radius:3px;
          color:#fff;
          font-family:'DM Mono',monospace;
          font-size:14px;letter-spacing:0.05em;
          outline:none;
          transition:border-color 0.2s;
        }
        #auth-overlay input[type="password"]:focus {
          border-color:rgba(255,184,28,0.5);
          background:rgba(255,184,28,0.03);
        }
        #auth-overlay input[type="password"]::placeholder { color:rgba(255,255,255,0.2); }
        #auth-overlay .remember-wrap {
          display:flex;align-items:center;justify-content:flex-start;
          gap:10px;
          margin-bottom:20px;
          cursor:pointer;
        }
        #auth-overlay .remember-wrap input[type="checkbox"] {
          appearance:none;-webkit-appearance:none;
          width:18px;height:18px;
          border:1px solid rgba(255,184,28,0.4);
          border-radius:3px;
          background:rgba(255,255,255,0.04);
          cursor:pointer;
          position:relative;
          flex-shrink:0;
          transition:background 0.2s, border-color 0.2s;
        }
        #auth-overlay .remember-wrap input[type="checkbox"]:checked {
          background:#FFB81C;
          border-color:#FFB81C;
        }
        #auth-overlay .remember-wrap input[type="checkbox"]:checked::after {
          content:'';
          position:absolute;
          left:4px;top:1px;
          width:5px;height:9px;
          border:2px solid #080c12;
          border-top:none;border-left:none;
          transform:rotate(45deg);
        }
        #auth-overlay .remember-label {
          font-family:'Inter',sans-serif;
          font-size:13px;
          color:rgba(255,255,255,0.45);
          cursor:pointer;
          user-select:none;
        }
        #auth-overlay button {
          width:100%;padding:14px;
          background:#FFB81C;
          border:none;border-radius:3px;
          color:#080c12;
          font-family:'Bebas Neue',sans-serif;
          font-size:18px;letter-spacing:0.1em;
          cursor:pointer;
          transition:background 0.2s, transform 0.1s;
        }
        #auth-overlay button:hover { background:#ffc94d; }
        #auth-overlay button:active { transform:scale(0.98); }
        #auth-overlay .auth-error {
          margin-top:12px;height:16px;
          font-size:12px;letter-spacing:0.05em;
          color:#ff4444;
          font-family:'DM Mono',monospace;
        }
      </style>
      <div class="auth-bg"></div>
      <div class="auth-box">
        <div class="auth-logo">
          <svg viewBox="0 0 40 40" fill="none">
            <polygon points="20,2 38,20 20,38 2,20" stroke="#FFB81C" stroke-width="2.5" fill="none"/>
            <polygon points="20,9 31,20 20,31 9,20" stroke="#FFB81C" stroke-width="1.5" fill="rgba(255,184,28,0.12)"/>
            <circle cx="20" cy="20" r="3" fill="#FFB81C"/>
          </svg>
          <span class="auth-logo-text">Data<em>Diamond</em></span>
        </div>
        <h2>Canadian Baseball League · Restricted Access</h2>
        <div class="auth-input-wrap">
          <input type="password" id="auth-input" placeholder="Enter password" autocomplete="off" />
        </div>
        <label class="remember-wrap">
          <input type="checkbox" id="auth-remember" />
          <span class="remember-label">Remember me on this device</span>
        </label>
        <button id="auth-btn">Enter</button>
        <div class="auth-error" id="auth-error"></div>
      </div>
    \`;
    document.body.appendChild(overlay);
    document.getElementById('auth-input').focus();

    return new Promise(resolve => {
      async function attempt() {
        const pwd      = document.getElementById('auth-input').value;
        const remember = document.getElementById('auth-remember').checked;
        const hash     = await sha256(pwd);
        if (hash === HASH) {
          if (remember) {
            localStorage.setItem(key, 'ok');
          } else {
            sessionStorage.setItem(key, 'ok');
          }
          overlay.style.opacity = '0';
          overlay.style.transition = 'opacity 0.4s';
          setTimeout(() => overlay.remove(), 400);
          resolve();
        } else {
          document.getElementById('auth-error').textContent = 'Incorrect password — try again.';
          document.getElementById('auth-input').value = '';
          document.getElementById('auth-input').focus();
        }
      }
      document.getElementById('auth-btn').addEventListener('click', attempt);
      document.getElementById('auth-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') attempt();
      });
    });
  }

  document.addEventListener('DOMContentLoaded', checkAuth);
</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>

            <polygon points="20,2 38,20 20,38 2,20" stroke="#FFB81C" stroke-width="2.5" fill="none"/>
            <polygon points="20,9 31,20 20,31 9,20" stroke="#FFB81C" stroke-width="1.5" fill="rgba(255,184,28,0.12)"/>
            <circle cx="20" cy="20" r="3" fill="#FFB81C"/>
          </svg>
          <span class="logo-text">Data<em>Diamond</em></span>

      </div>
            <nav class="main-nav">

  <div class="ticker-wrap"><div class="ticker-track" id="stat-ticker"></div></div>
