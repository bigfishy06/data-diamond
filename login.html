<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Diamond — Sign In</title>

  <!-- ✅ Replace with your actual Google Client ID in both places below -->
  <meta name="google-signin-client_id" content="348783711243-h0tiqjvdpjclh8t4cj5imqobpskr0c50.apps.googleusercontent.com">
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0e1525;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      color: #e8eaf0;
    }

    .login-card {
      background: #161e30;
      border: 1px solid rgba(255, 184, 28, 0.2);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    .login-logo {
      font-size: 40px;
      margin-bottom: 8px;
    }

    .login-title {
      font-size: 26px;
      font-weight: 700;
      color: #FFB81C;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    .login-subtitle {
      font-size: 13px;
      color: #8a93a8;
      margin-bottom: 36px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
      color: #3a4255;
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,184,28,0.1);
    }

    /* Centre the Google button */
    .google-btn-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    #login-error {
      min-height: 20px;
      font-size: 13px;
      color: #ff6b6b;
      margin-top: 16px;
    }

    .login-footer {
      margin-top: 32px;
      font-size: 11px;
      color: #3a4255;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="login-logo">💎</div>
    <div class="login-title">Data Diamond</div>
    <div class="login-subtitle">IBL Advanced Analytics</div>

    <div class="divider">sign in to continue</div>

    <div class="google-btn-wrap">
      <!--
        data-client_id   → paste your Client ID here too
        data-callback    → must match the function name in main.js / below
        data-theme       → filled | outline
        data-size        → large | medium | small
      -->
      <div id="g_id_onload"
           data-client_id="348783711243-h0tiqjvdpjclh8t4cj5imqobpskr0c50.apps.googleusercontent.com"
           data-callback="handleGoogleSignIn"
           data-auto_prompt="false">
      </div>
      <div class="g_id_signin"
           data-type="standard"
           data-shape="rectangular"
           data-theme="filled_black"
           data-text="sign_in_with"
           data-size="large"
           data-logo_alignment="left">
      </div>
    </div>

    <div id="login-error"></div>

    <div class="login-footer">Access is restricted to authorised users only.</div>
  </div>

  <script>
    const ALLOWED_EMAILS = ["christiansturgeon06@gmail.com"];

    function handleGoogleSignIn(response) {
      try {
        var base64 = response.credential.split(".")[1]
          .replace(/-/g, "+").replace(/_/g, "/");
        var payload = JSON.parse(atob(base64));
        var email = (payload.email || "").toLowerCase().trim();

        if (!ALLOWED_EMAILS.includes(email)) {
          document.getElementById("login-error").textContent =
            "Blocked: " + email + " is not authorised to access this site.";
          return;
        }

        var user = {
          name:    payload.given_name || payload.name || "User",
          email:   email,
          picture: payload.picture || ""
        };
        sessionStorage.setItem("dd_user", JSON.stringify(user));
        window.location.href = "index.html";

      } catch(e) {
        document.getElementById("login-error").textContent =
          "Sign-in failed. Please try again.";
        console.error("Auth error:", e);
      }
    }

    try {
      var saved = sessionStorage.getItem("dd_user");
      if (saved && JSON.parse(saved).email) {
        window.location.href = "index.html";
      }
    } catch(e) {}
  </script>

</body>
</html>
