<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Diamond — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0e1525;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      color: #e8eaf0;
    }
    .login-card {
      background: #161e30;
      border: 1px solid rgba(255,184,28,0.2);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    .login-logo { display:flex; align-items:center; justify-content:center; margin-bottom:8px; }
    .login-title {
      font-size: 26px;
      font-weight: 700;
      color: #FFB81C;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }
    .login-title em { color:#fff; font-style:normal; }
    .login-subtitle { font-size:13px; color:#8a93a8; margin-bottom:36px; }
    .divider {
      display:flex; align-items:center; gap:12px;
      margin-bottom:28px; color:#3a4255; font-size:12px;
    }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:rgba(255,184,28,0.1); }
    #signin-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 13px 20px;
      background: #fff;
      border: none;
      border-radius: 6px;
      color: #1f1f1f;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      margin-bottom: 16px;
      transition: background 0.2s;
    }
    #signin-btn:hover { background: #f0f0f0; }
    #signin-btn:disabled { opacity:0.6; cursor:not-allowed; }
    #login-error { min-height:20px; font-size:13px; color:#ff6b6b; margin-top:8px; font-family:monospace; }
    .login-footer { margin-top:32px; font-size:11px; color:#3a4255; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:48px;height:48px">
        <polygon points="20,2 38,20 20,38 2,20" stroke="#FFB81C" stroke-width="2.5" fill="none"/>
        <polygon points="20,9 31,20 20,31 9,20" stroke="#FFB81C" stroke-width="1.5" fill="rgba(255,184,28,0.12)"/>
        <circle cx="20" cy="20" r="3" fill="#FFB81C"/>
      </svg>
    </div>
    <div class="login-title">Data<em>Diamond</em></div>
    <div class="login-subtitle">CBL Advanced Analytics</div>
    <div class="divider">sign in to continue</div>

    <button id="signin-btn">
      <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Sign in with Google
    </button>

    <div id="login-error"></div>
    <div class="login-footer">Access is restricted to authorised users only.</div>
  </div>

  <script>
    var CLIENT_ID    = "348783711243-h0tiqjvdpjclh8t4cj5imqobpskr0c50.apps.googleusercontent.com";
    var REDIRECT_URI = "https://data-diamond.ca/login.html";

    // Already signed in — go straight to app
    try {
      var saved = localStorage.getItem("dd_user");
      if (saved && JSON.parse(saved).email) {
        window.location.replace("index.html");
      }
    } catch(e) {}

    // Handle redirect back from Google (id_token in URL hash)
    (function handleCallback() {
      var hash = window.location.hash.substring(1);
      if (!hash) return;

      var params  = new URLSearchParams(hash);
      var idToken = params.get("id_token");
      var error   = params.get("error");

      // Clean the URL immediately
      window.history.replaceState({}, '', window.location.pathname);

      if (error || !idToken) {
        if (error) document.getElementById("login-error").textContent = "Sign-in was cancelled.";
        return;
      }

      try {
        var b64 = idToken.split(".")[1].replace(/-/g,"+").replace(/_/g,"/");
        while (b64.length % 4) b64 += "=";
        var payload = JSON.parse(atob(b64));
        var email   = (payload.email || "").toLowerCase().trim();

        // Fetch allowed list from server then validate
        fetch("/allowed.json?_=" + Date.now())
          .then(function(r) { return r.json(); })
          .then(function(data) {
            var allowed = (data.emails || []).map(function(e){ return e.toLowerCase().trim(); });
            if (!allowed.includes(email)) {
              document.getElementById("login-error").textContent =
                "Blocked: " + email + " is not authorised.";
              return;
            }
            localStorage.setItem("dd_user", JSON.stringify({
              name:    payload.given_name || payload.name || "User",
              email:   email,
              picture: payload.picture || ""
            }));
            setTimeout(function(){ window.location.replace("index.html"); }, 100);
          })
          .catch(function() {
            document.getElementById("login-error").textContent =
              "Could not verify access. Please try again.";
          });

      } catch(e) {
        document.getElementById("login-error").textContent = "Sign-in failed. Please try again.";
        console.error(e);
      }
    })();

    // Sign in button — full page redirect to Google, no iframes, no popups
    document.getElementById("signin-btn").addEventListener("click", function() {
      this.disabled = true;
      var params = new URLSearchParams({
        client_id:     CLIENT_ID,
        redirect_uri:  REDIRECT_URI,
        response_type: "id_token",
        scope:         "openid email profile",
        nonce:         Math.random().toString(36).slice(2) + Date.now(),
        prompt:        "select_account"
      });
      window.location.href = "https://accounts.google.com/o/oauth2/v2/auth?" + params.toString();
    });
  </script>
</body>
</html>
