<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Diamond — Sign In</title>
  <meta name="google-signin-client_id" content="348783711243-h0tiqjvdpjclh8t4cj5imqobpskr0c50.apps.googleusercontent.com">
  <script src="https://accounts.google.com/gsi/client" onload="initGSI()"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0e1525;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      color: #e8eaf0;
    }
    .login-card {
      background: #161e30;
      border: 1px solid rgba(255, 184, 28, 0.2);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    .login-logo { display:flex; align-items:center; justify-content:center; margin-bottom:8px; }
    .login-title {
      font-size: 26px;
      font-weight: 700;
      color: #FFB81C;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }
    .login-title em { color: #fff; font-style: normal; }
    .login-subtitle { font-size: 13px; color: #8a93a8; margin-bottom: 36px; }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
      color: #3a4255;
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,184,28,0.1);
    }
    .google-btn-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }
    #login-error {
      min-height: 20px;
      font-size: 13px;
      color: #ff6b6b;
      margin-top: 16px;
    }
    .login-footer {
      margin-top: 32px;
      font-size: 11px;
      color: #3a4255;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:52px;height:52px;display:block;margin:0 auto 4px">
        <polygon points="20,2 38,20 20,38 2,20" stroke="#FFB81C" stroke-width="2.5" fill="none"/>
        <polygon points="20,9 31,20 20,31 9,20" stroke="#FFB81C" stroke-width="1.5" fill="rgba(255,184,28,0.12)"/>
        <circle cx="20" cy="20" r="3" fill="#FFB81C"/>
      </svg>
    </div>
    <div class="login-title">Data<em>Diamond</em></div>
    <div class="login-subtitle">CBL Advanced Analytics</div>

    <div class="divider">sign in to continue</div>

    <div class="google-btn-wrap">
      <div id="g_signin_btn"></div>
    </div>

    <div id="login-error"></div>
    <div class="login-footer">Access is restricted to authorised users only.</div>
  </div>

  <script>
    var ALLOWED_EMAILS = ["christiansturgeon06@gmail.com"];

    function initGSI() {
      google.accounts.id.initialize({
        client_id: "348783711243-h0tiqjvdpjclh8t4cj5imqobpskr0c50.apps.googleusercontent.com",
        callback:  handleGoogleSignIn,
        auto_select: false
      });
      google.accounts.id.renderButton(
        document.getElementById("g_signin_btn"),
        { type: "standard", shape: "rectangular", theme: "filled_black",
          text: "sign_in_with", size: "large", logo_alignment: "left" }
      );
    }

    function handleGoogleSignIn(response) {
      try {
        var base64 = response.credential.split(".")[1]
          .replace(/-/g, "+").replace(/_/g, "/");
        while (base64.length % 4) base64 += "=";
        var payload = JSON.parse(atob(base64));
        var email = (payload.email || "").toLowerCase().trim();

        if (!ALLOWED_EMAILS.includes(email)) {
          document.getElementById("login-error").textContent =
            "Blocked: " + email + " is not authorised to access this site.";
          return;
        }

        localStorage.setItem("dd_user", JSON.stringify({
          name:    payload.given_name || payload.name || "User",
          email:   email,
          picture: payload.picture || ""
        }));
        setTimeout(function() { window.location.replace("index.html"); }, 100);

      } catch(e) {
        document.getElementById("login-error").textContent = "Sign-in failed. Please try again.";
        console.error("Auth error:", e);
      }
    }

    try {
      var saved = localStorage.getItem("dd_user");
      if (saved && JSON.parse(saved).email) {
        window.location.replace("index.html");
      }
    } catch(e) {}
  </script>
</body>
</html>
