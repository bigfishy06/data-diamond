<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Team Stats — Data Diamond</title>
  <link rel="stylesheet" href="css/style.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

</head>
<body class="teams-page">

      <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <a href="index.html">
          <svg class="logo-diamond" viewBox="0 0 40 40" fill="none">
            <polygon points="20,2 38,20 20,38 2,20" stroke="#FFB81C" stroke-width="2.5" fill="none"/>
            <polygon points="20,9 31,20 20,31 9,20" stroke="#FFB81C" stroke-width="1.5" fill="rgba(255,184,28,0.12)"/>
            <circle cx="20" cy="20" r="3" fill="#FFB81C"/>
          </svg>
          <span class="logo-text">Data<em>Diamond</em></span>
        </a>
      </div>
      <nav class="main-nav">
        <a href="index.html"   class="nav-link">Home</a>
        <a href="teams.html"   class="nav-link active">Team Stats</a>
        <a href="players.html" class="nav-link">Player Stats</a>
        <a href="scouting.html" class="nav-link">Scouting</a>
      </nav>
      <div class="header-search">
        <input type="text" id="global-search" placeholder="Search players…" autocomplete="off" />
        <div id="search-dropdown" class="search-dropdown hidden"></div>
      </div>
    </div>
  </header>

  <!-- TEAM SELECT or TEAM DETAIL (JS decides) -->
  <div id="page-content"></div>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-inner">
        <div class="logo">
          <a href="index.html" style="display:flex;align-items:center;gap:8px;text-decoration:none">
            <svg class="logo-diamond" viewBox="0 0 40 40" fill="none" style="width:24px;height:24px">
              <polygon points="20,2 38,20 20,38 2,20" stroke="#FFB81C" stroke-width="2.5" fill="none"/>
              <circle cx="20" cy="20" r="3" fill="#FFB81C"/>
            </svg>
            <span class="logo-text" style="font-size:16px">Data<em>Diamond</em></span>
          </a>
        </div>

      </div>
    </div>

  <script src="js/main.js"></script>
